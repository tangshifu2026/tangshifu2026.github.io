<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>阿旺视频</title>
<style>
body{font-family:-apple-system;background:#111;color:#fff;text-align:center;padding:40px 20px}
h2{color:#07c160;margin-bottom:10px}
.file{font-size:14px;color:#aaa;word-break:break-all;margin:16px 0}
.btn{display:inline-block;margin:10px;padding:14px 28px;background:#07c160;color:#fff;border-radius:10px;font-size:16px;text-decoration:none;font-weight:600}
.btn2{display:inline-block;margin:10px;padding:12px 24px;background:#333;color:#ccc;border-radius:10px;font-size:14px;text-decoration:none}
.hint{margin-top:24px;font-size:13px;color:#777;line-height:1.6}
</style>
</head>
<body>
<h2>阿旺视频</h2>
<div id="filename" class="file"></div>
<a class="btn" id="link1" href="#">GitHub下载</a>
<a class="btn btn2" id="link2" href="#">隧道下载</a>
<div class="hint">微信内打不开？右上角 ··· 浏览器打开</div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var file = p.get('file') || '';
  if(!file){ document.getElementById('filename').innerText='缺少文件'; return; }
  document.getElementById('filename').innerText = file;
  var enc = encodeURIComponent(file);
  document.getElementById('link1').href = 'https://tangshifu2026.github.io/' + enc;
  var TUNNEL = 'surveys-salaries-almost-surgical.trycloudflare.com';
  document.getElementById('link2').href = 'https://' + TUNNEL + '/download/' + enc;
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>阿旺视频下载</title>
<style>
body{font-family:-apple-system,sans-serif;background:#111;color:#fff;text-align:center;padding:40px 20px}
h2{color:#07c160;margin-bottom:10px}
.file{font-size:14px;color:#aaa;word-break:break-all;margin:16px 0}
.btn{display:inline-block;margin:10px;padding:14px 28px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:16px;text-decoration:none;font-weight:600}
.hint{margin-top:24px;font-size:13px;color:#777;line-height:1.6}
.loading{color:#888}
</style>
</head>
<body>
<h2>📥 阿旺视频下载</h2>
<div id="status" class="loading">正在获取下载地址...</div>
<div id="content" style="display:none">
  <div class="file" id="filename"></div>
  <a class="btn" id="dllink" href="#">⬇ 点击下载</a>
  <div class="hint">
    如微信内无法下载，请<br>
    长按此链接 →「在浏览器中打开」
  </div>
</div>
<script>
(async function(){
  var p = new URLSearchParams(location.search);
  var file = p.get('file') || '';
  if(!file){ document.getElementById('status').innerText='缺少文件名参数 ?file=xxx.mp4'; return; }

  // 从隧道获取当前地址
  try {
    var r = await fetch('https://convertible-somebody-ray-became.trycloudflare.com/files');
    var d = await r.json();
    var local = d.local_ip || '192.168.1.7';
    var url = 'https://convertible-somebody-ray-became.trycloudflare.com/download/' + encodeURIComponent(file);

    document.getElementById('status').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('filename').innerText = file;
    document.getElementById('dllink').href = url;
  } catch(e){
    document.getElementById('status').innerText='隧道暂不可达，请稍后重试';
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>阿旺视频下载</title>
<style>
body{font-family:-apple-system,sans-serif;background:#111;color:#fff;text-align:center;padding:40px 20px}
h2{color:#07c160;margin-bottom:10px}
.file{font-size:14px;color:#aaa;word-break:break-all;margin:16px 0}
.btn{display:inline-block;margin:10px;padding:14px 28px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:16px;text-decoration:none;font-weight:600}
.btn2{display:inline-block;margin:10px;padding:12px 24px;background:#444;color:#ccc;border:none;border-radius:10px;font-size:14px;text-decoration:none;font-weight:500}
.hint{margin-top:24px;font-size:13px;color:#777;line-height:1.6}
.loading{color:#888}
#status{margin:8px 0;font-size:13px}
</style>
</head>
<body>
<h2>📥 阿旺视频下载</h2>
<div id="filename" class="file"></div>
<a class="btn" id="dllink" href="#">⬇ 点击下载</a>
<div id="status" style="font-size:12px;color:#888;margin-top:8px"></div>
<div class="hint">
  如无法下载/显示乱码，请<br>
  长按链接 →「在浏览器中打开」<br>
  或复制链接到 Chrome/Safari 打开
</div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var file = p.get('file') || '';
  if(!file){ document.getElementById('filename').innerText='缺少文件名参数'; return; }

  // 当前隧道地址（自动同步）
  var TUNNEL = 'trip-watts-audience-nascar.trycloudflare.com';
  var url = 'https://' + TUNNEL + '/download/' + encodeURIComponent(file);
  var altUrl = 'https://' + TUNNEL + '/download/' + file; // 兜底：不编码

  document.getElementById('filename').innerText = file;
  document.getElementById('dllink').href = url;
  document.getElementById('dllink').onclick = function(e){
    // 先试编码版，失败静默回退
    var t = this;
    t.textContent = '下载中...';
    fetch(url, {method:'HEAD'}).then(function(r){
      if(r.ok){ window.location = url; }
      else{ window.location = altUrl; }
    }).catch(function(){
      window.location = altUrl;
    });
    e.preventDefault();
  };
  document.getElementById('status').innerText = '点击按钮下载，如失败请用外部浏览器';
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>阿旺视频下载</title>
<style>
body{font-family:-apple-system,sans-serif;background:#111;color:#fff;text-align:center;padding:40px 20px}
h2{color:#07c160;margin-bottom:10px}
.file{font-size:14px;color:#aaa;word-break:break-all;margin:16px 0}
.btn{display:inline-block;margin:10px;padding:14px 28px;background:#07c160;color:#fff;border:none;border-radius:10px;font-size:16px;text-decoration:none;font-weight:600}
.btn2{display:inline-block;margin:10px;padding:12px 24px;background:#444;color:#ccc;border:none;border-radius:10px;font-size:14px;text-decoration:none;font-weight:500}
.hint{margin-top:24px;font-size:13px;color:#777;line-height:1.6}
#status{margin:8px 0;font-size:13px}
</style>
</head>
<body>
<h2>⬇️ 阿旺视频下载</h2>
<div id="filename" class="file"></div>
<a class="btn" id="dllink" href="#" download>📥 点击下载</a>
<a class="btn2" id="playlink" href="#">▶️ 在线播放</a>
<div id="status"></div>
<div class="hint">
  手机端：点「点击下载」→ 浏览器底部弹出保存提示<br>
  电脑端：点「点击下载」→ 自动保存到下载文件夹<br>
  如果下载失败，点「在线播放」后长按视频保存
</div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var file = p.get('file') || '';

  // 如果没有 ?file= 参数，尝试从路径提取
  if(!file){
    var path = location.pathname.replace(/^\//,'');
    if(path && path !== 'index.html' && path !== ''){
      file = decodeURIComponent(path);
    }
  }

  if(!file){
    document.getElementById('filename').innerText = '未指定文件';
    document.getElementById('dllink').style.display = 'none';
    document.getElementById('playlink').style.display = 'none';
    document.getElementById('status').innerText = '请使用链接: ?file=xxx.mp4';
    return;
  }

  var dlUrl = file;
  // 确保 URL 编码正确
  if(dlUrl.indexOf('/') !== 0) dlUrl = '/' + dlUrl;

  document.getElementById('filename').innerText = '📁 ' + file;
  document.getElementById('dllink').href = dlUrl;
  document.getElementById('dllink').setAttribute('download', file);
  document.getElementById('playlink').href = dlUrl;
  document.getElementById('status').innerText = '';
})();
</script>
</body>
</html>

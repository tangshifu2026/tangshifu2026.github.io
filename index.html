<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>阿旺视频</title>
<style>
body{font-family:-apple-system;background:#111;color:#fff;text-align:center;padding:30px 16px}
h2{color:#07c160;margin-bottom:8px;font-size:18px}
.file{font-size:14px;color:#aaa;word-break:break-all;margin:12px 0}
.btn{display:block;margin:10px auto;padding:16px 24px;background:#07c160;color:#fff;border-radius:12px;font-size:17px;text-decoration:none;font-weight:600;max-width:320px}
.hint{margin-top:20px;font-size:13px;color:#777;line-height:1.8}
</style>
</head>
<body>
<h2>阿旺视频</h2>
<div id="filename" class="file"></div>

<a class="btn" id="dl" href="#">长按绿色按钮保存视频</a>

<div class="hint">
  长按上面按钮 → 下载链接 → 保存到文件<br>
  然后打开剪映 → 从文件导入<br>
  或复制此链接到 Chrome/Safari 打开下载
</div>

<script>
(function(){
  var p = new URLSearchParams(location.search);
  var file = p.get('file') || '';
  if(!file){ document.getElementById('filename').innerText='缺少文件'; return; }
  document.getElementById('filename').innerText = file;
  var enc = encodeURIComponent(file);
  document.getElementById('dl').href = 'https://tangshifu2026.github.io/' + enc;
})();
</script>
</body>
</html>
